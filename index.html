<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <div class="banner">
            <h1>Banner Layout</h1>
            <img src="img/banner.jpg" width="100%" alt="">
        </div>
        <div class="grid">
            <h1>Grid Layout</h1>
            <p>A Grid Layout must have a parent element with the <em>display</em> property set to <em>grid</em> or <em>inline-grid</em>.</p>
            <p>Direct child element(s) of the grid container automatically becomes grid items.</p>
            <div class="grid-row">
                <div class="grid-item">
                    <img src="img/p1.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p2.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p3.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p4.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p5.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p6.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p7.png" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p8.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p9.jpg" width="250" height="250" alt="">
                </div>
                <div class="grid-item">
                    <img src="img/p10.jpg" width="250" height="250" alt="">
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
